{% extends 'base.html' %}
{% block content %}
<div class="glass-card mx-auto form-shell text-center">
  <h1 class="hero-title mb-3">Удаление</h1>
  <p class="text-muted">Удалить: <strong>{{ object }}</strong>?</p>
  <form method="post" class="mt-4">
    {% csrf_token %}
    <div class="d-flex justify-content-center gap-2">
      <button class="btn btn-danger btn-lg rounded-pill px-4">Да, удалить</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg rounded-pill px-4">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
