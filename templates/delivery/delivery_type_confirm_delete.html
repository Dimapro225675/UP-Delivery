{% extends 'base.html' %}
{% block title %}Удалить {{ object.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="fas fa-exclamation-triangle me-2"></i>Подтверждение удаления</h4>
            </div>
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите удалить тип доставки "<strong>{{ object.name }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash me-2"></i>Да, удалить
                    </button>
                    <a href="{% url 'delivery_type_list' %}" class="btn btn-secondary">
                        Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
