{% extends 'base.html' %}
{% block title %}Решить проблему #{{ object.pk }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Проблема #{{ object.pk }} - {{ object.get_issue_type_display }}</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">{{ object.description }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 form-check">
                        {{ form.resolved }}
                        <label class="form-check-label" for="{{ form.resolved.id_for_label }}">
                            Проблема решена
                        </label>
                    </div>
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-check me-2"></i>Сохранить статус
                    </button>
                    <a href="{% url 'delivery:issue_list' %}" class="btn btn-secondary">
                        Назад к списку
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
