{% extends 'base.html' %}
{% block content %}
<div class="detail-hero mb-4">
  <div>
    <div class="eyebrow">Решение</div>
    <h1 class="hero-title">Закрытие проблемы</h1>
  </div>
</div>

<div class="glass-card mx-auto form-shell">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">{{ form.resolved.label }}</label>
      {{ form.resolved }}
      {% for error in form.resolved.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
    </div>
    <button class="btn btn-primary btn-lg rounded-pill px-4">Сохранить</button>
  </form>
</div>
{% endblock %}
