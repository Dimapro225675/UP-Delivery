{% extends 'base.html' %}
{% block content %}
<div class="detail-hero mb-4">
  <div>
    <div class="eyebrow">Форма</div>
    <h1 class="hero-title">Регистрация проблемы</h1>
  </div>
</div>

<div class="glass-card mx-auto form-shell">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-field">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}
      </div>
    {% endfor %}
    <div class="form-actions">
      <button class="btn btn-primary btn-lg rounded-pill px-4">Сохранить</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg rounded-pill px-4">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
