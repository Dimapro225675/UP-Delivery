{% extends 'base.html' %}
{% block title %}Выход{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-modal-shell">
  <section class="auth-modal auth-modal--compact">
    <div class="auth-modal__header">
      <span class="eyebrow">Аккаунт</span>
      <h1>Выйти из аккаунта?</h1>
      <p>Текущая сессия будет завершена после подтверждения.</p>
    </div>

    <form method="post" class="auth-form auth-form--actions">
      {% csrf_token %}
      <button class="btn btn-primary">Выйти</button>
      <a href="{% url 'home' %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
  </section>
</div>
{% endblock %}
