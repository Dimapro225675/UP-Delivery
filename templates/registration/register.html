{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<h2>Регистрация пользователя</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Создать пользователя</button>
</form>

<p>
    Уже зарегистрированы?
    <a href="{% url 'users:login' %}">Войти</a>
</p>
{% endblock %}
