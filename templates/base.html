{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Delivery Pro{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/delivery.css' %}">
</head>
<body class="app-body">

<header class="topbar">
  <div class="container-fluid px-4 py-3 d-flex align-items-center justify-content-between">
    <a class="brand" href="/">
      <span class="brand-mark">D</span>
      <span class="brand-text">Delivery Pro</span>
    </a>

    <nav class="topnav d-flex flex-wrap gap-2">
  <a href="{% url 'Order:order_list' %}" class="btn btn-outline-primary btn-sm rounded-pill">Заказы</a>
  <a href="{% url 'Order:delivery_type_list' %}" class="btn btn-outline-primary btn-sm rounded-pill">Типы доставки</a>
  <a href="{% url 'Order:payment_list' %}" class="btn btn-outline-primary btn-sm rounded-pill">Платежи</a>
  <a href="{% url 'Order:issue_list' %}" class="btn btn-outline-primary btn-sm rounded-pill">Проблемы</a>
  <a href="{% url 'Order:status_history_list' %}" class="btn btn-outline-primary btn-sm rounded-pill">История</a>
</nav>
  </div>
</header>

<main class="container-fluid px-4 py-4">
  {% if messages %}
    <div class="mb-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} rounded-4 border-0 shadow-sm">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
