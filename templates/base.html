{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Delivery Pro{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/delivery.css' %}">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-box">D</div>
      <div>
        <div class="logo-title">Delivery</div>
        <div class="logo-subtitle">Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{% url 'Order:order_list' %}">Заказы</a>
      <a href="{% url 'Order:delivery_type_list' %}">Типы доставки</a>
      <a href="{% url 'Order:payment_list' %}">Платежи</a>
      <a href="{% url 'Order:issue_list' %}">Проблемы</a>
      <a href="{% url 'Order:status_history_list' %}">История</a>
    </nav>
  </aside>

  <main class="main-content">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</div>

</body>
</html>
