<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Курьерская доставка{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'Order:order_list' %}">
            <i class="fas fa-truck me-2"></i>Курьерская служба
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'Order:order_list' %}">Заказы</a>
            <a class="nav-link" href="{% url 'Order:delivery_type_list' %}">Типы доставки</a>
            <a class="nav-link" href="{% url 'Order:payment_list' %}">Платежи</a>
            <a class="nav-link" href="{% url 'Order:status_history_list' %}">История</a>
            <a class="nav-link" href="{% url 'Order:issue_list' %}">Проблемы</a>
        </div>
    </div>
</nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
