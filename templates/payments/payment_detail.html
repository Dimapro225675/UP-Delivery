{% extends 'base.html' %}
{% block content %}
<div class="detail-hero mb-4">
  <div>
    <div class="eyebrow">Платеж #{{ object.pk }}</div>
    <h1 class="hero-title">{{ object.amount }} ₽</h1>
    <p class="hero-subtitle">Заказ #{{ object.order.pk }}</p>
  </div>
  <a href="{% url 'Order:payment_update' object.pk %}" class="btn btn-outline-primary btn-lg rounded-pill">Редактировать</a>
</div>

<div class="glass-card">
  <div class="row g-4">
    <div class="col-md-4"><div class="stat-box"><span>Способ</span><strong>{{ object.payment_method }}</strong></div></div>
    <div class="col-md-4"><div class="stat-box"><span>Статус</span><strong>{{ object.get_status_display }}</strong></div></div>
    <div class="col-md-4"><div class="stat-box"><span>Транзакция</span><strong>{{ object.transaction_id|default:"—" }}</strong></div></div>
  </div>
</div>
{% endblock %}
