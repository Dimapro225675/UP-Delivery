{% extends 'base.html' %}
{% block content %}
<div class="detail-hero mb-4">
  <div>
    <div class="eyebrow">Форма</div>
    <h1 class="hero-title">{% if object %}Редактирование платежа{% else %}Создание платежа{% endif %}</h1>
  </div>
</div>

<div class="glass-card mx-auto form-shell">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
      </div>
    {% endfor %}
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary btn-lg rounded-pill px-4">Сохранить</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg rounded-pill px-4">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
